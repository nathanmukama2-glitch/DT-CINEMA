<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DT Cinema Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .summary { margin-top: 20px; padding: 15px; background: #333; color: white; border-radius: 5px; }
        .warning { background: #dc3545 !important; border: 2px solid yellow; }
        #status { margin-top: 10px; font-weight: bold; text-align: center; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>DT Cinema Manager</h2>
    
    <form id="transactionForm">
        <label>Date</label>
        <input type="date" name="date" required>

        <label>Transaction Type</label>
        <select name="type">
            <option value="Income">Daily Income</option>
            <option value="Salary">Staff Salary (50k)</option>
            <option value="Rent">Rent (20k)</option>
            <option value="Fuel">Fuel</option>
            <option value="Data">Leica Data</option>
            <option value="Movies">New Movies</option>
            <option value="Bank">Bank Deposit</option>
        </select>

        <label>Amount (UGX)</label>
        <input type="number" name="amount" placeholder="e.g. 5000" required>

        <label>Notes</label>
        <input type="text" name="notes" placeholder="Details...">

        <button type="submit" id="submitBtn">Save Transaction</button>
    </form>

    <div id="status">Ready...</div>

    <div class="summary" id="balance-display">
        <p>Cash on Hand: <span id="cash-hand">0</span> UGX</p>
        <p>Total in Bank: <span id="bank-total">0</span> UGX</p>
        <button type="button" onclick="fetchBalances()" style="background: #007bff; margin-top: 5px; font-size: 12px; padding: 5px;">Refresh Balances</button>
    </div>
    <div style="margin-top: 20px;">
    <h3>Business Reports</h3>
    <table id="monthlyTable" style="width: 100%; border-collapse: collapse; font-size: 14px;">
        <thead>
            <tr style="background: #eee; text-align: left;">
                <th style="padding: 8px; border-bottom: 2px solid #ccc;">Month</th>
                <th style="padding: 8px; border-bottom: 2px solid #ccc;">Income</th>
                <th style="padding: 8px; border-bottom: 2px solid #ccc;">Net Profit</th>
            </tr>
        </thead>
        <tbody id="report-body">
            </tbody>
    </table>
</div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzYAKLFqlI3qLt0-CI9O8If5UvIXW0_qhtg-hzoUwBs21q_uTmuS_6xs5pw3o94sD1mMQ/exec'; 
    const form = document.getElementById('transactionForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('status').innerText = "Saving to Google Sheets...";
        document.getElementById('submitBtn').disabled = true;
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                document.getElementById('status').innerText = "✅ Saved Successfully!";
                document.getElementById('submitBtn').disabled = false;
                form.reset();
                fetchBalances();
            })
            .catch(error => {
                document.getElementById('status').innerText = "❌ Error: Connection Failed";
                document.getElementById('submitBtn').disabled = false;
            });
    });

   function fetchBalances() {
    fetch(scriptURL + "?action=getTotals")
        .then(res => res.json())
        .then(data => {
            // 1. Update Main Balances
            document.getElementById('cash-hand').innerText = (data.cash || 0).toLocaleString();
            document.getElementById('bank-total').innerText = (data.bank || 0).toLocaleString();

            // 2. Build Monthly Table
            const reportBody = document.getElementById('report-body');
            reportBody.innerHTML = ""; // Clear old data

            for (const month in data.history) {
                const row = `<tr>
                    <td style="padding: 8px; border-bottom: 1px solid #ddd;">${month}</td>
                    <td style="padding: 8px; border-bottom: 1px solid #ddd;">${data.history[month].income.toLocaleString()}</td>
                    <td style="padding: 8px; border-bottom: 1px solid #ddd; font-weight: bold; color: green;">
                        ${data.history[month].profit.toLocaleString()}
                    </td>
                </tr>`;
                reportBody.insertAdjacentHTML('beforeend', row);
            }
        });
}
    // This makes the app load the totals automatically on startup
window.onload = function() {
    fetchBalances();
};
</script>

</body>
</html>
