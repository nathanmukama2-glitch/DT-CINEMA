<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DT Cinema Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: #333; margin-bottom: 15px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-size: 16px; margin-top: 15px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .summary { margin-top: 20px; padding: 15px; background: #333; color: white; border-radius: 5px; text-align: center; }
        .summary p { margin: 5px 0; font-size: 18px; }
        .section { border-top: 2px solid #eee; margin-top: 25px; padding-top: 15px; }
        #status { margin-top: 10px; font-weight: bold; text-align: center; color: #007bff; min-height: 20px; }
        .bank-btn { background: #6f42c1; }
        .startup-btn { background: #17a2b8; }
    </style>
</head>
<body>

<div class="container">
    <h2>DT Cinema Manager</h2>
    
    <div id="status">Ready...</div>

    <form id="transactionForm">
        <h3>Daily Transactions</h3>
        <label>Date</label>
        <input type="date" name="date" id="tDate" required>

        <label>Type</label>
        <select name="type">
            <option value="Income">Daily Income</option>
            <option value="Salary">Staff Salary (50k)</option>
            <option value="Rent">Rent (20k)</option>
            <option value="Fuel">Fuel</option>
            <option value="Data">Leica Data</option>
            <option value="Movies">New Movies</option>
            <option value="Other">Other Expense</option>
        </select>

        <label>Amount (UGX)</label>
        <input type="number" name="amount" placeholder="Enter amount" required>

        <label>Notes</label>
        <input type="text" name="notes" placeholder="Details...">

        <button type="submit">Save Transaction</button>
    </form>

    <div class="section">
        <form id="bankForm">
            <h3>Bank Savings</h3>
            <label>Amount to Save (UGX)</label>
            <input type="number" name="amount" placeholder="Deposit to Bank" required>
            <button type="submit" class="bank-btn">Deposit to Bank</button>
        </form>
    </div>

    <div class="summary" id="balance-display">
        <p>Cash on Hand: <span id="cash-hand">0</span> UGX</p>
        <p>Total in Bank: <span id="bank-total">0</span> UGX</p>
        <button type="button" onclick="fetchBalances()" style="background: #444; margin-top: 10px; font-size: 12px; padding: 8px;">Update Balances</button>
    </div>

    <div class="section">
        <h3>Startup Assets</h3>
        <form id="startupForm">
            <label>Item Name</label>
            <input type="text" name="itemName" placeholder="e.g. Cinema Chairs" required>
            <label>Value (UGX)</label>
            <input type="number" name="itemValue" placeholder="Cost of item" required>
            <button type="submit" class="startup-btn">Record Startup Item</button>
        </form>
    </div>

    <div class="section">
        <h3>Monthly Reports</h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
            <thead>
                <tr style="background: #eee; text-align: left;">
                    <th style="padding: 8px; border-bottom: 2px solid #ccc;">Month</th>
                    <th style="padding: 8px; border-bottom: 2px solid #ccc;">Income</th>
                    <th style="padding: 8px; border-bottom: 2px solid #ccc;">Profit</th>
                </tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw7z-7daVCSpKJzu06EKkf1M7D4Y_wnQwXgLZywVfLvvRWN6FMrRY2mmJlmYLCd9cRkjA/exec'; 
    
    // Auto-set today's date
    document.getElementById('tDate').valueAsDate = new Date();

    // Universal Submit Function
    function submitData(formElement, actionName, successText) {
        document.getElementById('status').innerText = "Processing...";
        const formData = new FormData(formElement);
        formData.append('action', actionName);

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(res => {
                document.getElementById('status').innerText = "✅ " + successText;
                formElement.reset();
                document.getElementById('tDate').valueAsDate = new Date();
                fetchBalances();
            })
            .catch(err => {
                document.getElementById('status').innerText = "❌ Error saving data";
            });
    }

    // Form Listeners
    document.getElementById('transactionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        submitData(this, 'saveTransaction', 'Transaction Saved!');
    });

    document.getElementById('bankForm').addEventListener('submit', function(e) {
        e.preventDefault();
        submitData(this, 'saveBank', 'Bank Deposit Recorded!');
    });

    document.getElementById('startupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        submitData(this, 'saveStartup', 'Asset Added!');
    });

    function fetchBalances() {
        fetch(scriptURL + "?action=getTotals")
            .then(res => res.json())
            .then(data => {
                document.getElementById('cash-hand').innerText = (data.cash || 0).toLocaleString();
                document.getElementById('bank-total').innerText = (data.bank || 0).toLocaleString();

                const reportBody = document.getElementById('report-body');
                reportBody.innerHTML = ""; 
                for (const month in data.history) {
                    const row = `<tr>
                        <td style="padding: 8px; border-bottom: 1px solid #ddd;">${month}</td>
                        <td style="padding: 8px; border-bottom: 1px solid #ddd;">${data.history[month].income.toLocaleString()}</td>
                        <td style="padding: 8px; border-bottom: 1px solid #ddd; font-weight: bold; color: green;">${data.history[month].profit.toLocaleString()}</td>
                    </tr>`;
                    reportBody.insertAdjacentHTML('beforeend', row);
                }
            });
    }

    window.onload = fetchBalances;
</script>

</body>
</html>
